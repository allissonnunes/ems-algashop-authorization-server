management:
  endpoint:
    health:
      show-details: always
      group:
        readiness:
          include:
            - readinessState
        liveness:
          include:
            - livenessState
      status:
        order: DOWN, OUT_OF_SERVICE, DEGRADED, UP, UNKNOWN
  endpoints:
    web:
      exposure:
        include:
          - health
          - info

spring:
  application:
    name: authorization-server
